<form class="{{cssClass}} locus-cast-sheet locus-item-sheet locus-infliction-sheet" autocomplete="off">
  <div class="locus-sheet__background"></div>

  <header class="locus-cast-header locus-item-header">
    <div class="locus-cast-header__portrait-wrap">
      <img
        class="locus-cast-header__portrait"
        src="{{item.img}}"
        data-edit="img"
        title="{{item.name}}"
      />
    </div>

    <div class="locus-cast-header__identity">
      <div class="locus-cast-header__title-wrap">
        <span class="locus-ui-label">Infliction Name</span>
        <h1 class="locus-cast-header__title">
          <input
            type="text"
            name="name"
            value="{{item.name}}"
            placeholder="Infliction Name"
          />
        </h1>
      </div>

      <div class="locus-cast-header__subtitle-row">
        <div class="locus-type-pill">
          <span>Infliction</span>
        </div>
      </div>
    </div>
  </header>

  <section class="locus-panel">
    <div class="locus-panel__header">
      <h2>Infliction Details</h2>
    </div>
    <div class="locus-panel__body">
      <div class="locus-form-grid locus-form-grid--2">
        <div class="locus-field">
          <label>Descriptor</label>
          <input
            type="text"
            name="system.descriptor"
            value="{{system.descriptor}}"
            placeholder="Bleeding, panic, corruption..."
          />
        </div>

       <div class="locus-field">
  <label>Attribute</label>
  <select name="system.attribute">
    {{#each attributes as |attribute|}}
    <option value="{{attribute}}" {{#if (eq ../system.attribute attribute)}}selected{{/if}}>
      {{capitalize attribute}}
    </option>
    {{/each}}
  </select>
</div>

        <div class="locus-field">
          <label>Condition</label>
          <input
            type="text"
            name="system.condition"
            value="{{system.condition}}"
            placeholder="On hit, on sight, on failed resist..."
          />
        </div>

        <div class="locus-field">
          <label>Difficulty</label>
          <select name="system.difficulty">
            {{#each difficulties as |difficulty|}}
            <option value="{{difficulty}}" {{#if (eq ../system.difficulty difficulty)}}selected{{/if}}>
              {{capitalize difficulty}}
            </option>
            {{/each}}
          </select>
        </div>
      </div>
    </div>
  </section>

  <section class="locus-panel locus-subpanel">
    <div class="locus-panel__header">
      <h2>Rules Text</h2>
    </div>
    <div class="locus-panel__body">
      <div class="locus-field">
        <textarea
          name="system.description"
          rows="12"
          placeholder="Full infliction rules, effect text, GM notes..."
        >{{system.description}}</textarea>
      </div>
    </div>
  </section>
</form>
